name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Configure npm auth
        # pnpm publish honors NPM_TOKEN only via .npmrc — write it
        # explicitly so the release does not silently 401 on the first
        # workspace package.
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          echo "registry=https://registry.npmjs.org/" >> ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify tarballs (dry run)
        # Sanity check: tarballs should not include test fixtures, src TS,
        # or stray data/ directories. Fail the release if they do.
        run: |
          set -euo pipefail
          for pkg in packages/protocol packages/storage packages/core packages/soul packages/engine-gateway apps/inspector apps/core-daemon; do
            echo "=== $pkg ==="
            (cd "$pkg" && pnpm pack --dry-run 2>&1 | tee "/tmp/pack-${pkg//\//-}.txt")
            if grep -E '__tests__|\.test\.|/data/.*\.db' "/tmp/pack-${pkg//\//-}.txt"; then
              echo "ERROR: $pkg tarball contains forbidden paths"
              exit 1
            fi
          done

      - name: Publish to npm
        # --recursive walks the workspace in topological order; private
        # workspace roots (root + apps/inspector/web) are skipped.
        run: pnpm publish --recursive --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
