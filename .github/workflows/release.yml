name: Release

# Do-SOUL Alaya is distributed via GitHub Releases (source tarball
# + SHA256SUMS), not npm. The end-user installer scripts/install.sh
# downloads these two assets, verifies the checksum, then runs pnpm
# install + pnpm build inside the user's $ALAYA_HOME.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to package, smoke, and optionally publish'
        required: true
        type: string
      publish:
        description: 'Create the GitHub Release after all gates pass'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '9.15.9'
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  quality:
    name: Build, test, hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release versions
        run: pnpm run release:check-version -- "$RELEASE_TAG"

      - name: High severity dependency audit
        run: pnpm run ci:audit-high

      - name: Typecheck
        run: pnpm run --if-present typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Hygiene
        run: pnpm run hygiene:unused

      - name: Guard test as-any
        run: pnpm run ci:test-as-any

      - name: Guard inspector dependency isolation
        run: pnpm run hygiene:inspector-deps

  windows-preflight:
    name: Windows build + CLI preflight
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run --if-present typecheck

      - name: Build
        run: pnpm build

      - name: CLI preflight smoke
        run: node scripts/ci/smoke-built-cli.mjs --preflight-only

  content-contracts:
    name: Bench content contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check bench-history contract
        run: node scripts/ci/check-content-contracts.mjs

  self-benchmark:
    name: Self benchmark recall gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run self benchmark and gate R@5
        run: |
          set -euo pipefail
          HISTORY_ROOT="${RUNNER_TEMP}/self-bench-history"
          rm -rf "$HISTORY_ROOT"
          node apps/bench-runner/bin/alaya-bench-runner.mjs self --history-root "$HISTORY_ROOT"
          node scripts/ci/self-benchmark-gate.mjs --history-root "$HISTORY_ROOT"

  package:
    name: Package release assets
    runs-on: ubuntu-latest
    needs:
      - quality
      - windows-preflight
      - content-contracts
      - self-benchmark
    permissions:
      contents: read
      attestations: write
      id-token: write
    outputs:
      tag: ${{ steps.pack.outputs.tag }}
      tarball: ${{ steps.pack.outputs.tarball }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release versions
        run: pnpm run release:check-version -- "$RELEASE_TAG"

      - name: Build
        run: pnpm build

      - name: Pack source tarball + SHA256SUMS
        id: pack
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"
          VERSION="${TAG#v}"
          PREFIX="do-soul-alaya-${VERSION}"
          TARBALL="${PREFIX}.tar.gz"

          # git archive HEAD captures exactly what the checked-out tag points to.
          git archive --format=tar.gz --prefix="${PREFIX}/" -o "${TARBALL}" HEAD

          tar -tzf "${TARBALL}" > tarball-listing.txt
          grep -qF "${PREFIX}/bin/alaya.mjs" tarball-listing.txt \
            || { echo "FATAL: tarball missing bin/alaya.mjs"; exit 1; }
          grep -qF "${PREFIX}/package.json" tarball-listing.txt \
            || { echo "FATAL: tarball missing package.json"; exit 1; }
          grep -qF "${PREFIX}/scripts/install.sh" tarball-listing.txt \
            || { echo "FATAL: tarball missing scripts/install.sh"; exit 1; }
          tar_size=$(stat -c%s "${TARBALL}")
          [ "$tar_size" -gt 1024 ] \
            || { echo "FATAL: tarball is suspiciously small (${tar_size} bytes)"; exit 1; }

          sha256sum "${TARBALL}" > SHA256SUMS
          cat SHA256SUMS

          {
            echo "tag=${TAG}"
            echo "tarball=${TARBALL}"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            ${{ steps.pack.outputs.tarball }}
            SHA256SUMS
            tarball-listing.txt
          retention-days: 14

      - name: Attest release assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            ${{ steps.pack.outputs.tarball }}
            SHA256SUMS

  install-smoke:
    name: Installer smoke from packaged assets
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.package.outputs.tag }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Smoke test installer against packaged assets
        run: |
          set -euo pipefail
          TARBALL="${GITHUB_WORKSPACE}/release-assets/${{ needs.package.outputs.tarball }}"
          SUMS="${GITHUB_WORKSPACE}/release-assets/SHA256SUMS"
          SMOKE_HOME="${RUNNER_TEMP}/alaya-smoke-home"
          SMOKE_BIN="${RUNNER_TEMP}/alaya-smoke-bin"
          rm -rf "$SMOKE_HOME" "$SMOKE_BIN" "${SMOKE_HOME}.bak" "${SMOKE_HOME}".staging-*
          mkdir -p "$SMOKE_BIN"

          ALAYA_VERSION="${{ needs.package.outputs.tag }}" \
          ALAYA_LOCAL_TARBALL="$TARBALL" \
          ALAYA_LOCAL_SHA256SUMS="$SUMS" \
          ALAYA_HOME="$SMOKE_HOME" \
          ALAYA_BIN_DIR="$SMOKE_BIN" \
            bash scripts/install.sh

          "$SMOKE_BIN/alaya" --help > install-smoke.txt
          echo "SMOKE OK: tarball + install.sh contract upholds end-to-end." >> install-smoke.txt

      - name: Upload install smoke evidence
        uses: actions/upload-artifact@v4
        with:
          name: install-smoke
          path: install-smoke.txt
          retention-days: 14

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - package
      - install-smoke
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish) }}
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.package.outputs.tag }}
          TARBALL: ${{ needs.package.outputs.tarball }}
        run: |
          set -euo pipefail
          prerelease_args=()
          if [[ "$TAG" == *-* ]]; then
            prerelease_args+=(--prerelease)
          fi
          gh release create "$TAG" \
            --verify-tag \
            --title "$TAG" \
            --generate-notes \
            "${prerelease_args[@]}" \
            "release-assets/$TARBALL" \
            release-assets/SHA256SUMS
