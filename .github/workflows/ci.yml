name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  PNPM_VERSION: '9.15.9'

jobs:
  quality:
    name: Quality (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: ubuntu-node22
            os: ubuntu-latest
            node: '22'
            run_hygiene: true
            run_coverage: true
            run_smoke: false
          - label: macos-node22
            os: macos-latest
            node: '22'
            run_hygiene: false
            run_coverage: false
            run_smoke: false
          - label: windows-node22
            os: windows-latest
            node: '22'
            run_hygiene: false
            run_coverage: false
            run_smoke: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install ripgrep for hygiene guards
        if: ${{ matrix.run_hygiene && runner.os == 'Linux' }}
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Typecheck
        run: pnpm run --if-present typecheck

      - name: Build
        run: pnpm build

      - name: Test with coverage
        if: ${{ matrix.run_coverage }}
        run: pnpm run test:coverage

      - name: Test
        if: ${{ !matrix.run_coverage }}
        run: pnpm test

      - name: Hygiene
        if: ${{ matrix.run_hygiene }}
        run: pnpm run hygiene:unused

      - name: Guard test as-any
        if: ${{ matrix.run_hygiene }}
        run: pnpm run ci:test-as-any

      - name: Guard inspector dependency isolation
        if: ${{ matrix.run_hygiene }}
        run: pnpm run hygiene:inspector-deps

      - name: CLI preflight smoke
        if: ${{ matrix.run_smoke }}
        run: node scripts/ci/smoke-built-cli.mjs --preflight-only

      - name: Upload coverage baseline
        if: ${{ matrix.run_coverage }}
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage-${{ matrix.label }}
          path: coverage
          retention-days: 14

  content-contracts:
    name: Bench content contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check bench-history contract
        run: node scripts/ci/check-content-contracts.mjs

  install-smoke:
    name: CLI install surface smoke
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Smoke built CLI in an isolated workspace
        run: node scripts/ci/smoke-built-cli.mjs
